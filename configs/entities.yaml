# Curated entity / theme -> beneficiary tickers mapping.
#
# Each top-level key is a theme name. Each theme has:
#   keywords: list of synonyms / phrases that trigger this theme on substring match
#   beneficiaries: list of tickers with a short mechanism note + a prior confidence
#   current_context (OPTIONAL): hand-written narrative about the sector's current
#     situation, especially events the LLM may not know about due to its training
#     cutoff. Injected into hypothesis-generation prompts as informational context
#     so the LLM can REASON about it (and override with a contrarian thesis if
#     warranted) rather than being mechanically blocked. Update as you notice
#     sector dynamics the LLM keeps missing.
#
# Confidence is a *prior*, not a probability of profit -- it reflects how cleanly
# the ticker maps to the theme (1.0 = pure-play, 0.5 = partial exposure).
#
# This is a starter set. Expand freely as you discover new event categories.
# When two themes match the same text, beneficiaries are unioned (max confidence
# wins for tickers in multiple themes).

